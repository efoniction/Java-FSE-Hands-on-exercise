<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <div>

    <label>Student Name</label><br>

    <input
      type="text"
      formControlName="studentName">

      <div
  *ngIf="enrollForm.get('studentEmail')?.touched &&
         enrollForm.get('studentEmail')?.errors">

  <small
    *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">
    Email is required
  </small>

  <small
    *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">
    Invalid email
  </small>

  <small
    *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
    Email already exists.
  </small>

</div>

<div *ngIf="enrollForm.get('studentEmail')?.pending">
  Checking email...
</div>

    </div>


  <br>

  <div>

    <label>Email</label><br>

    <input
      type="email"
      formControlName="studentEmail">

    <div
      *ngIf="enrollForm.get('studentEmail')?.touched &&
             enrollForm.get('studentEmail')?.errors">

      <small
        *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">
        Email is required
      </small>

      <small
        *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">
        Invalid email
      </small>

    </div>

  </div>

  <br>

  <div>

  <label>Course ID</label><br>

  <input
    type="text"
    formControlName="courseId">

  <div
    *ngIf="enrollForm.get('courseId')?.errors?.['required']
           && enrollForm.get('courseId')?.touched">

    <small>Course ID is required</small>

  </div>

  <div
    *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

    <small>Course code starting with XX is not allowed.</small>

  </div>

</div>

  <br>

  <div>

    <label>Semester</label><br>

    <select formControlName="preferredSemester">

      <option value="Odd">
        Odd
      </option>

      <option value="Even">
        Even
      </option>

    </select>

  </div>

  <br>

  <div>

    <label>

      <input
        type="checkbox"
        formControlName="agreeToTerms">

      I Agree to Terms

    </label>

  </div>

  <br>

  <hr>

<h3>Additional Courses</h3>

<button
  type="button"
  (click)="addCourse()">

  Add Another Course

</button>

<br><br>

<div formArrayName="additionalCourses">
  <div
    *ngFor="let ctrl of additionalCourses.controls; let i = index">

    <input
      [formControlName]="i"
      placeholder="Course Code">

    <button
      type="button"
      (click)="removeCourse(i)">

    Remove

  </button>

</div>

<br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>
