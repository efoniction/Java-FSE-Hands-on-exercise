<h2>Enrollment Request Form</h2>

<form #enrollForm="ngForm"
      (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->
  <label>Student Name</label><br>

  <input
      type="text"
      name="studentName"
      [(ngModel)]="studentName"
      required
      minlength="3"
      #nameCtrl="ngModel">

  <div *ngIf="nameCtrl.touched">

    <span *ngIf="nameCtrl.errors?.['required']">
      Name is required
    </span>

    <span *ngIf="nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
    </span>

  </div>

  <br><br>

  <!-- Email -->

  <label>Email</label><br>

  <input
      type="email"
      name="studentEmail"
      [(ngModel)]="studentEmail"
      required
      email
      #emailCtrl="ngModel">

  <div *ngIf="emailCtrl.touched">

    <span *ngIf="emailCtrl.errors?.['required']">
      Email is required
    </span>

    <span *ngIf="emailCtrl.errors?.['email']">
      Enter a valid email
    </span>

  </div>

  <br><br>

  <!-- Course ID -->

  <label>Course ID</label><br>

  <input
      type="number"
      name="courseId"
      [(ngModel)]="courseId"
      required
      #courseCtrl="ngModel">

  <div *ngIf="courseCtrl.touched">

    <span *ngIf="courseCtrl.errors?.['required']">
      Course ID is required
    </span>

  </div>

  <br><br>

  <!-- Semester -->

  <label>Preferred Semester</label><br>

  <select
      name="preferredSemester"
      [(ngModel)]="preferredSemester"
      required
      #semesterCtrl="ngModel">

      <option value="">Select Semester</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

  </select>

  <br><br>

  <!-- Checkbox -->

  <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      required
      #termsCtrl="ngModel">

  I agree to the Terms & Conditions

  <div *ngIf="termsCtrl.touched">

    <span *ngIf="termsCtrl.errors?.['required']">
      Please accept the terms.
    </span>

  </div>

  <br><br>

  <!-- Submit -->

  <button
      type="submit"
      [disabled]="enrollForm.invalid">

      Submit

  </button>

  &nbsp;

  <!-- Reset -->

  <button
      type="button"
      (click)="enrollForm.resetForm(); submitted=false">

      Reset

  </button>

</form>

<br>

<!-- Success Message -->

<div *ngIf="submitted">

    ✅ Enrollment request submitted successfully!

</div>
